<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Itinerary AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:       #1a1a18;
      --paper:     #f7f4ef;
      --cream:     #efe9df;
      --gold:      #b8924a;
      --gold-lt:   #d4b07a;
      --rust:      #c45c3a;
      --sage:      #6b8c6e;
      --mist:      #8a96a3;
      --border:    #ddd8cf;
      --card-bg:   #ffffff;
      --chat-w:    400px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 56px;
      border-bottom: 1px solid var(--border);
      background: var(--paper);
      flex-shrink: 0;
      z-index: 10;
    }
    .logo { display: flex; align-items: baseline; gap: 0.5rem; }
    .logo-word {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--ink);
    }
    .logo-tag {
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--gold);
    }
    .header-hint { font-size: 0.72rem; color: var(--mist); font-style: italic; }

    /* ── LAYOUT ─────────────────────────────────────────── */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* ── CHAT PANE ──────────────────────────────────────── */
    #chat-pane {
      width: var(--chat-w);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--paper);
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.25rem 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .msg-wrap { display: flex; flex-direction: column; }
    .msg-wrap.user { align-items: flex-end; }
    .msg-wrap.assistant { align-items: flex-start; }

    .msg-label {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--mist);
      margin-bottom: 0.3rem;
      font-weight: 500;
    }
    .bubble {
      max-width: 88%;
      padding: 0.65rem 0.9rem;
      border-radius: 2px;
      line-height: 1.55;
      font-size: 0.85rem;
    }
    .msg-wrap.user .bubble { background: var(--ink); color: #fff; }
    .msg-wrap.assistant .bubble {
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--ink);
    }
    .msg-wrap.assistant.loading .bubble { color: var(--mist); }

    /* typing dots */
    .typing { display: flex; align-items: center; gap: 4px; height: 18px; }
    .typing span {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--mist);
      animation: blink 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%,80%,100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* ── INPUT AREA ─────────────────────────────────────── */
    #input-area {
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    /* tabs */
    .input-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .input-tab {
      flex: 1;
      padding: 0.5rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--mist);
      background: none;
      border: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .input-tab.active {
      color: var(--ink);
      border-bottom-color: var(--gold);
    }

    /* quick chat panel */
    #panel-chat {
      padding: 0.9rem 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    #panel-form { display: none; }

    #user-input {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid var(--border);
      background: var(--card-bg);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      color: var(--ink);
      resize: none;
      outline: none;
      border-radius: 2px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    #user-input:focus { border-color: var(--gold); }
    #user-input::placeholder { color: var(--mist); }

    .send-row { display: flex; justify-content: flex-end; }

    .send-btn {
      padding: 0.45rem 1.2rem;
      background: var(--ink);
      color: #fff;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-radius: 2px;
      transition: background 0.15s, transform 0.1s;
    }
    .send-btn:hover { background: #333; }
    .send-btn:active { transform: scale(0.97); }
    .send-btn:disabled { opacity: 0.35; cursor: default; transform: none; }

    /* ── TRIP BUILDER FORM ───────────────────────────────── */
    #panel-form {
      padding: 0.75rem 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      overflow-y: auto;
      max-height: 340px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .form-row { display: flex; gap: 0.5rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.2rem; flex: 1; }
    .form-label {
      font-size: 0.62rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--mist);
    }
    .form-input, .form-select {
      padding: 0.4rem 0.6rem;
      border: 1px solid var(--border);
      background: var(--card-bg);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      color: var(--ink);
      border-radius: 2px;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-select:focus { border-color: var(--gold); }
    .form-input::placeholder { color: var(--mist); }

    /* pill interest input */
    .pill-input-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      padding: 0.35rem 0.5rem;
      border: 1px solid var(--border);
      background: var(--card-bg);
      border-radius: 2px;
      cursor: text;
      min-height: 32px;
      align-items: center;
      transition: border-color 0.15s;
    }
    .pill-input-wrap:focus-within { border-color: var(--gold); }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0.1rem 0.4rem;
      font-size: 0.72rem;
      color: var(--ink);
    }
    .pill-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--mist);
      font-size: 0.75rem;
      line-height: 1;
      padding: 0;
    }
    .pill-remove:hover { color: var(--rust); }
    #interest-input {
      border: none;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      color: var(--ink);
      background: transparent;
      flex: 1;
      min-width: 80px;
    }
    #interest-input::placeholder { color: var(--mist); }

    /* ── ITINERARY PANE ─────────────────────────────────── */
    #itinerary-pane {
      flex: 1;
      overflow-y: auto;
      background: var(--cream);
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 1rem;
      padding: 2rem;
      text-align: center;
      pointer-events: none;
    }
    .empty-compass { font-size: 2.5rem; opacity: 0.18; }
    .empty-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--ink);
      opacity: 0.25;
    }
    .empty-sub { font-size: 0.78rem; color: var(--mist); opacity: 0.7; max-width: 240px; line-height: 1.6; }

    #itinerary-content { display: none; padding: 2rem 2.5rem 3rem; max-width: 820px; }
    #itinerary-content.visible { display: block; }

    .itin-header { margin-bottom: 2rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); }
    .itin-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      font-weight: 600;
      line-height: 1.2;
      color: var(--ink);
      margin-bottom: 0.5rem;
    }
    .itin-meta { display: flex; gap: 1.25rem; flex-wrap: wrap; }
    .itin-meta-chip {
      font-size: 0.72rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--gold);
      border: 1px solid var(--gold-lt);
      padding: 0.2rem 0.6rem;
      border-radius: 2px;
      background: rgba(184,146,74,0.06);
    }

    .days-grid { display: flex; flex-direction: column; gap: 1.25rem; }

    .day-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      overflow: hidden;
      animation: fadeUp 0.35s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .day-card-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.85rem 1.25rem;
      background: var(--ink);
      color: #fff;
      cursor: pointer;
      user-select: none;
    }
    .day-number { font-size: 0.65rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; opacity: 0.55; flex-shrink: 0; }
    .day-name { font-family: 'Playfair Display', serif; font-size: 1rem; font-style: italic; flex: 1; }
    .day-cost { font-size: 0.75rem; font-weight: 500; color: var(--gold-lt); flex-shrink: 0; }
    .day-chevron { font-size: 0.7rem; opacity: 0.45; flex-shrink: 0; transition: transform 0.2s; }
    .day-card.collapsed .day-chevron { transform: rotate(-90deg); }

    .day-body { overflow: hidden; transition: max-height 0.3s ease; }
    .day-card.collapsed .day-body { max-height: 0 !important; }

    .slot {
      display: flex;
      align-items: flex-start;
      gap: 0.9rem;
      padding: 0.65rem 1.25rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }
    .slot:last-child { border-bottom: none; }
    .slot:hover { background: var(--paper); }

    .slot-icon { font-size: 1rem; flex-shrink: 0; width: 22px; text-align: center; margin-top: 1px; }
    .slot-body { flex: 1; min-width: 0; }
    .slot-period {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 500;
      margin-bottom: 0.15rem;
    }
    .slot-period.morning   { color: var(--gold); }
    .slot-period.afternoon { color: var(--rust); }
    .slot-period.evening   { color: var(--sage); }
    .slot-period.lodging   { color: var(--mist); }
    .slot-period.dining    { color: var(--sage); }

    .slot-name { font-size: 0.88rem; font-weight: 500; line-height: 1.35; color: var(--ink); }
    .slot-detail { font-size: 0.75rem; color: var(--mist); margin-top: 0.15rem; line-height: 1.4; }
    .slot-note {
      display: inline-block;
      margin-top: 0.25rem;
      font-size: 0.68rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--rust);
      background: rgba(196,92,58,0.08);
      padding: 0.1rem 0.4rem;
      border-radius: 2px;
    }
    .slot-cost { font-size: 0.78rem; font-weight: 500; color: var(--ink); flex-shrink: 0; padding-top: 1px; }

    .itin-total {
      margin-top: 1.5rem;
      padding: 1rem 1.5rem;
      background: var(--ink);
      color: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 3px;
    }
    .total-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.55; }
    .total-amount { font-family: 'Playfair Display', serif; font-size: 1.4rem; }

    #disruption-banner {
      display: none;
      margin-top: 1.25rem;
      padding: 0.9rem 1.25rem;
      background: rgba(196,92,58,0.08);
      border: 1px solid rgba(196,92,58,0.25);
      border-radius: 3px;
      font-size: 0.8rem;
      color: var(--rust);
      line-height: 1.5;
    }
    #disruption-banner.visible { display: block; }
    .disruption-label { font-weight: 600; text-transform: uppercase; font-size: 0.65rem; letter-spacing: 0.1em; margin-bottom: 0.3rem; }

    .raw-response {
      white-space: pre-wrap;
      font-size: 0.83rem;
      line-height: 1.7;
      color: var(--ink);
      padding: 1.5rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 3px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-word">Itinerary AI</span>
    <span class="logo-tag">Travel Optimizer</span>
  </div>
  <span class="header-hint">For travel advisors &amp; independent explorers</span>
</header>

<div id="main">

  <!-- ── CHAT ── -->
  <div id="chat-pane">
    <div id="messages"></div>

    <div id="input-area">
      <!-- mode tabs -->
      <div class="input-tabs">
        <button class="input-tab active" id="tab-chat" onclick="switchTab('chat')">Quick Chat</button>
        <button class="input-tab" id="tab-form" onclick="switchTab('form')">Trip Builder</button>
      </div>

      <!-- quick chat panel -->
      <div id="panel-chat">
        <textarea id="user-input" rows="3"
          placeholder="Describe a trip — or report a disruption&#10;e.g. &quot;5-day Rome, couple, $200/day, ancient history&quot;"></textarea>
        <div class="send-row">
          <button class="send-btn" id="send-btn" onclick="sendChat()">Plan trip →</button>
        </div>
      </div>

      <!-- trip builder form panel -->
      <div id="panel-form">
        <div class="form-row">
          <div class="form-group" style="flex:2">
            <label class="form-label">Destination *</label>
            <input class="form-input" id="f-dest" placeholder="e.g. Rome, Tokyo" />
          </div>
          <div class="form-group">
            <label class="form-label">Days *</label>
            <input class="form-input" id="f-days" type="number" min="1" max="30" placeholder="5" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Budget / day</label>
            <input class="form-input" id="f-budget" placeholder="$200" />
          </div>
          <div class="form-group">
            <label class="form-label">Group</label>
            <select class="form-select" id="f-group">
              <option value="solo traveler">Solo</option>
              <option value="couple" selected>Couple</option>
              <option value="family with kids">Family</option>
              <option value="group of friends">Friends</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Travel style</label>
            <select class="form-select" id="f-style">
              <option value="mid-range" selected>Mid-range</option>
              <option value="budget">Budget</option>
              <option value="luxury">Luxury</option>
              <option value="backpacker">Backpacker</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Lodging</label>
            <select class="form-select" id="f-lodging">
              <option value="any" selected>Any</option>
              <option value="hotel">Hotel</option>
              <option value="boutique hotel">Boutique</option>
              <option value="hostel">Hostel</option>
              <option value="Airbnb / apartment">Apartment</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Interests (Enter or comma to add)</label>
          <div class="pill-input-wrap" id="pill-wrap" onclick="document.getElementById('interest-input').focus()">
            <input id="interest-input" placeholder="e.g. ancient history, food, art…" autocomplete="off" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Dietary restrictions</label>
          <input class="form-input" id="f-diet" placeholder="e.g. vegetarian, gluten-free" />
        </div>
        <div class="form-group">
          <label class="form-label">Must-see / must-do</label>
          <input class="form-input" id="f-must" placeholder="e.g. Colosseum, sunset gondola ride" />
        </div>
        <div class="form-group">
          <label class="form-label">Mobility notes</label>
          <input class="form-input" id="f-mob" placeholder="e.g. wheelchair accessible" />
        </div>
        <div class="send-row" style="padding-top:0.3rem">
          <button class="send-btn" id="form-send-btn" onclick="sendForm()">Build itinerary →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── ITINERARY ── -->
  <div id="itinerary-pane">
    <div id="empty-state">
      <div class="empty-compass">✦</div>
      <div class="empty-title">Your itinerary<br>will appear here</div>
      <div class="empty-sub">Describe your trip in the chat — or use Trip Builder — to generate a day-by-day plan</div>
    </div>
    <div id="itinerary-content"></div>
  </div>

</div>

<script>
// ─── State ────────────────────────────────────────────────
let sessionId = null;
let interests = [];

// ─── DOM refs ─────────────────────────────────────────────
const msgs        = document.getElementById('messages');
const userInput   = document.getElementById('user-input');
const emptyState  = document.getElementById('empty-state');
const itinPane    = document.getElementById('itinerary-content');

// ─── Tab switching ────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('tab-chat').classList.toggle('active', tab === 'chat');
  document.getElementById('tab-form').classList.toggle('active', tab === 'form');
  document.getElementById('panel-chat').style.display = tab === 'chat' ? 'flex' : 'none';
  document.getElementById('panel-form').style.display = tab === 'form' ? 'flex' : 'none';
}

// ─── Interest pill input ──────────────────────────────────
const interestInput = document.getElementById('interest-input');
const pillWrap      = document.getElementById('pill-wrap');

function addInterest(val) {
  const v = val.trim().replace(/,+$/, '').trim();
  if (v && !interests.includes(v)) {
    interests.push(v);
    const pill = document.createElement('span');
    pill.className = 'pill';
    pill.innerHTML = `${escHtml(v)}<button class="pill-remove" onclick="removeInterest(this,'${escHtml(v)}')" title="Remove">×</button>`;
    pillWrap.insertBefore(pill, interestInput);
  }
  interestInput.value = '';
}

function removeInterest(btn, val) {
  interests = interests.filter(i => i !== val);
  btn.closest('.pill').remove();
}

interestInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); addInterest(interestInput.value); }
  if (e.key === 'Backspace' && !interestInput.value && interests.length) {
    const last = interests[interests.length - 1];
    interests.pop();
    pillWrap.querySelectorAll('.pill').forEach(p => { if (p.textContent.startsWith(last)) p.remove(); });
  }
});
interestInput.addEventListener('blur', () => { if (interestInput.value.trim()) addInterest(interestInput.value); });

// ─── Form → NL message ───────────────────────────────────
function formToMessage() {
  const dest   = document.getElementById('f-dest').value.trim();
  const days   = document.getElementById('f-days').value.trim();
  const budget = document.getElementById('f-budget').value.trim();
  const group  = document.getElementById('f-group').value;
  const style  = document.getElementById('f-style').value;
  const lodging= document.getElementById('f-lodging').value;
  const diet   = document.getElementById('f-diet').value.trim();
  const must   = document.getElementById('f-must').value.trim();
  const mob    = document.getElementById('f-mob').value.trim();

  if (!dest || !days) return null;

  let msg = `${days}-day trip to ${dest} for a ${group}`;
  if (budget) msg += `, ${budget}/day budget`;
  if (style !== 'mid-range') msg += `, ${style} travel style`;
  if (interests.length) msg += `, interested in ${interests.join(', ')}`;
  if (diet)    msg += `, dietary restrictions: ${diet}`;
  if (lodging !== 'any') msg += `, prefer ${lodging}`;
  if (must)    msg += `, must include: ${must}`;
  if (mob)     msg += `, mobility notes: ${mob}`;
  return msg;
}

// ─── Chat helpers ─────────────────────────────────────────
function addMsg(role, html, loading = false) {
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role}${loading ? ' loading' : ''}`;
  wrap.innerHTML = `
    <div class="msg-label">${role === 'user' ? 'You' : 'Advisor AI'}</div>
    <div class="bubble">${html}</div>`;
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  return wrap;
}

function mdToHtml(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Hardened itinerary parser ────────────────────────────
//
// Handles all known LLM output variations:
//   **Day 1 — Vatican**   **Day 1 - Vatican**   **Day 1: Vatican**
//   ## Day 1 — Vatican    Day 1 - Vatican (plain)
//   Slot lines with or without emojis, costs anywhere, notes after —

const EMOJI_PERIOD = {
  '🏨': 'lodging',   // 🏨
  '🌅': 'morning',   // 🌅
  '🌇': 'afternoon', // 🌇
  '🌆': 'evening',   // 🌆
  '🍽': 'dining',    // 🍽
  '💰': 'cost',      // 💰
};
// also handle composed emoji variants
const EMOJI_PERIOD_STR = {
  '🏨': 'lodging', '🌅': 'morning', '🌇': 'afternoon',
  '🌆': 'evening', '🍽': 'dining', '🍽️': 'dining', '💰': 'cost',
};

const SLOT_ICONS = {
  lodging:'🏨', morning:'🌅', afternoon:'🌇', evening:'🌆', dining:'🍽️', cost:'💰',
};

const PERIOD_WORDS = {
  morning:1, afternoon:1, evening:1, night:1,
  lunch:1, dinner:1, breakfast:1, lodging:1, hotel:1, accommodation:1,
};

function detectPeriod(content) {
  for (const [emoji, period] of Object.entries(EMOJI_PERIOD_STR)) {
    if (content.startsWith(emoji)) return period;
  }
  const m = content.match(/^(morning|afternoon|evening|night|lunch|dinner|breakfast|lodging|hotel|accommodation)[:\s]/i);
  if (m) {
    const w = m[1].toLowerCase();
    if (w === 'morning' || w === 'breakfast') return 'morning';
    if (w === 'afternoon' || w === 'lunch')   return 'afternoon';
    if (w === 'evening' || w === 'dinner' || w === 'night') return 'evening';
    return 'lodging';
  }
  return 'morning';
}

const NOTE_RE = /[—–]\s*(.+)$/;
const COST_PAREN_RE = /\(~?\$[\d,]+[^)]*\)/;
const COST_BARE_RE  = /~?\$[\d,]+[^\s,).]*/;

function parseSlot(content) {
  let body = content
    .replace(/^[🏨🌅🌇🌆🍽️💰\s]+/, '')
    .replace(/^(morning|afternoon|evening|night|lunch|dinner|breakfast|lodging|hotel|accommodation)[:\s]+/i, '')
    .trim();

  let note = '';
  const nm = body.match(NOTE_RE);
  if (nm) { note = nm[1].trim(); body = body.slice(0, nm.index).trim(); }

  let cost = '';
  const cp = body.match(COST_PAREN_RE);
  if (cp) {
    cost = cp[0].replace(/[()]/g,'').trim();
    body = body.replace(cp[0], '').trim();
  } else {
    const cb = body.match(COST_BARE_RE);
    if (cb) { cost = cb[0]; body = body.replace(cb[0], '').replace(/,\s*$/, '').trim(); }
  }

  return { body, note, cost };
}

function parseItinerary(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const result = { title: '', meta: [], days: [], total: '', raw: text };
  let currentDay = null;

  for (const line of lines) {
    // Title: **5-Day Rome Itinerary**  or  # 5-Day Rome Itinerary
    if (!result.title && /itinerary/i.test(line) && !/^[-•]/.test(line)) {
      result.title = line.replace(/\*\*/g,'').replace(/^#+\s*/,'').trim();
      continue;
    }

    // Meta: Budget: $200/day | Group: Couple
    if (/^(\*\*)?budget:/i.test(line)) {
      result.meta = line.replace(/\*\*/g,'').split('|').map(s => s.trim()).filter(Boolean);
      continue;
    }

    // Total cost line
    if (/total estimated cost/i.test(line)) {
      result.total = line.replace(/\*\*/g,'').replace(/^[-•]\s*/,'').trim();
      continue;
    }

    // Day header — handles all separator variants and optional **
    // e.g. **Day 1 — Vatican**  |  ## Day 1: Vatican  |  Day 1 - Vatican
    const dm = line.match(/^(?:\*\*|#+\s*)?Day\s+(\d+)\s*[—–:\-]+\s*(.+?)[\*\s]*$/i);
    if (dm) {
      currentDay = {
        number: parseInt(dm[1]),
        name: dm[2].replace(/\*\*/g,'').trim(),
        slots: [],
        cost: '',
      };
      result.days.push(currentDay);
      continue;
    }

    // Slot line
    if (currentDay && /^[-•]\s/.test(line)) {
      const content = line.replace(/^[-•]\s+/,'');

      // daily cost line
      if (/💰/.test(content) || /day total/i.test(content) || /daily total/i.test(content)) {
        currentDay.cost = content.replace(/💰\s*/,'').replace(/\*\*/g,'').trim();
        continue;
      }
      if (/^cost:/i.test(content)) {
        currentDay.cost = content.replace(/^cost:\s*/i,'').trim();
        continue;
      }

      const period = detectPeriod(content);
      if (period === 'cost') { currentDay.cost = content.replace(/💰\s*/,'').trim(); continue; }

      const { body, note, cost } = parseSlot(content);
      if (body) {
        currentDay.slots.push({
          period,
          icon: SLOT_ICONS[period] || '📍',
          name: body,
          note,
          cost,
        });
      }
    }
  }

  return result;
}

// ─── Render itinerary ─────────────────────────────────────
function renderItinerary(text) {
  const data = parseItinerary(text);

  emptyState.style.display = 'none';
  itinPane.classList.add('visible');

  if (data.days.length === 0) {
    itinPane.innerHTML = `<div class="raw-response">${mdToHtml(text)}</div>`;
    return;
  }

  const metaChips = data.meta
    .map(m => `<span class="itin-meta-chip">${escHtml(m)}</span>`)
    .join('');

  const dayCards = data.days.map((day, i) => {
    const slots = day.slots.map(slot => {
      return `
        <div class="slot">
          <div class="slot-icon">${slot.icon}</div>
          <div class="slot-body">
            <div class="slot-period ${slot.period}">${slot.period}</div>
            <div class="slot-name">${escHtml(slot.name)}</div>
            ${slot.note ? `<div class="slot-detail"><span class="slot-note">⚠ ${escHtml(slot.note)}</span></div>` : ''}
          </div>
          ${slot.cost ? `<div class="slot-cost">${escHtml(slot.cost)}</div>` : ''}
        </div>`;
    }).join('');

    const bodyHeight = day.slots.length * 72 + 16;

    return `
      <div class="day-card" style="animation-delay:${i * 0.06}s">
        <div class="day-card-header" onclick="toggleDay(this)">
          <span class="day-number">Day ${day.number}</span>
          <span class="day-name">${escHtml(day.name)}</span>
          ${day.cost ? `<span class="day-cost">${escHtml(day.cost)}</span>` : ''}
          <span class="day-chevron">▼</span>
        </div>
        <div class="day-body" style="max-height:${bodyHeight}px">${slots}</div>
      </div>`;
  }).join('');

  const totalHtml = data.total ? `
    <div class="itin-total">
      <span class="total-label">Total estimated cost</span>
      <span class="total-amount">${escHtml(data.total.replace(/total estimated cost:?\s*/i,''))}</span>
    </div>` : '';

  itinPane.innerHTML = `
    <div class="itin-header">
      <div class="itin-title">${escHtml(data.title || 'Your Itinerary')}</div>
      <div class="itin-meta">${metaChips}</div>
    </div>
    <div class="days-grid">${dayCards}</div>
    ${totalHtml}
    <div id="disruption-banner"></div>`;
}

function toggleDay(header) {
  const card = header.closest('.day-card');
  const body = card.querySelector('.day-body');
  if (card.classList.contains('collapsed')) {
    card.classList.remove('collapsed');
    body.style.maxHeight = body.dataset.height || (body.scrollHeight + 'px');
  } else {
    body.dataset.height = body.scrollHeight + 'px';
    card.classList.add('collapsed');
  }
}

// ─── Disruption banner ────────────────────────────────────
function renderDisruption(text) {
  const banner = document.getElementById('disruption-banner');
  if (!banner) return;
  banner.innerHTML = `<div class="disruption-label">⚡ Re-plan applied</div>${mdToHtml(text)}`;
  banner.classList.add('visible');
  banner.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function isDisruptionResponse(text) {
  return /re.?plan|disruption|replaced|removed slot|affected day/i.test(text);
}

function looksLikeItinerary(text) {
  return /day\s+\d/i.test(text) && /(morning|afternoon|evening|itinerary)/i.test(text);
}

// ─── Core send ────────────────────────────────────────────
async function doSend(text, sendBtnEl) {
  if (!text) return;
  sendBtnEl.disabled = true;

  addMsg('user', escHtml(text));
  const loadingWrap = addMsg('assistant', '<div class="typing"><span></span><span></span><span></span></div>', true);

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, session_id: sessionId }),
    });

    const raw = await res.text();

    if (!res.ok) {
      let detail = raw;
      try { detail = JSON.parse(raw).detail ?? raw; } catch(_) {}
      loadingWrap.querySelector('.bubble').innerHTML =
        `<span style="color:var(--rust)">Error ${res.status}</span><br><small>${escHtml(detail.slice(0,200))}</small>`;
      loadingWrap.classList.remove('loading');
      sendBtnEl.disabled = false;
      return;
    }

    const data = JSON.parse(raw);
    sessionId = data.session_id;
    const response = data.response;

    const summary = extractChatSummary(response);
    loadingWrap.querySelector('.bubble').innerHTML = mdToHtml(summary);
    loadingWrap.classList.remove('loading');

    if (isDisruptionResponse(response)) {
      renderDisruption(response);
    } else if (looksLikeItinerary(response)) {
      renderItinerary(response);
    }

  } catch(e) {
    loadingWrap.querySelector('.bubble').textContent = e.message;
    loadingWrap.classList.remove('loading');
  }

  sendBtnEl.disabled = false;
}

function extractChatSummary(text) {
  const lines = text.split('\n').filter(l => l.trim());
  const summary = lines
    .filter(l => !/^[-•]\s*[🏨🌅🌇🌆🍽💰]/.test(l) && !/^\*\*Day \d/.test(l))
    .slice(0, 3)
    .join('\n');
  return summary || lines[0] || text;
}

// ─── Send handlers ────────────────────────────────────────
function sendChat() {
  const text = userInput.value.trim();
  if (!text) return;
  userInput.value = '';
  doSend(text, document.getElementById('send-btn'));
}

function sendForm() {
  const msg = formToMessage();
  if (!msg) { alert('Please enter at least a destination and number of days.'); return; }
  switchTab('chat');
  doSend(msg, document.getElementById('send-btn'));
}

// ─── Event listeners ──────────────────────────────────────
userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
});
userInput.focus();
</script>
