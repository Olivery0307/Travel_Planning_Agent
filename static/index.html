<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Itinerary AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:       #1a1a18;
      --paper:     #f7f4ef;
      --cream:     #efe9df;
      --gold:      #b8924a;
      --gold-lt:   #d4b07a;
      --rust:      #c45c3a;
      --sage:      #6b8c6e;
      --mist:      #8a96a3;
      --border:    #ddd8cf;
      --card-bg:   #ffffff;
      --chat-w:    380px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 56px;
      border-bottom: 1px solid var(--border);
      background: var(--paper);
      flex-shrink: 0;
      z-index: 10;
    }
    .logo {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
    }
    .logo-word {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--ink);
    }
    .logo-tag {
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--gold);
    }
    .header-hint {
      font-size: 0.72rem;
      color: var(--mist);
      font-style: italic;
    }

    /* ── LAYOUT ─────────────────────────────────────────── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── CHAT PANE ──────────────────────────────────────── */
    #chat-pane {
      width: var(--chat-w);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--paper);
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.25rem 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .msg-wrap { display: flex; flex-direction: column; }
    .msg-wrap.user { align-items: flex-end; }
    .msg-wrap.assistant { align-items: flex-start; }

    .msg-label {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--mist);
      margin-bottom: 0.3rem;
      font-weight: 500;
    }

    .bubble {
      max-width: 88%;
      padding: 0.65rem 0.9rem;
      border-radius: 2px;
      line-height: 1.55;
      font-size: 0.85rem;
    }
    .msg-wrap.user .bubble {
      background: var(--ink);
      color: #fff;
    }
    .msg-wrap.assistant .bubble {
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--ink);
    }
    .msg-wrap.assistant.loading .bubble {
      color: var(--mist);
    }

    /* typing dots */
    .typing { display: flex; align-items: center; gap: 4px; height: 18px; }
    .typing span {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--mist);
      animation: blink 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%,80%,100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    #input-area {
      padding: 0.9rem 1.25rem 1rem;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    #user-input {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid var(--border);
      background: var(--card-bg);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      color: var(--ink);
      resize: none;
      outline: none;
      border-radius: 2px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    #user-input:focus { border-color: var(--gold); }
    #user-input::placeholder { color: var(--mist); }

    #send-btn {
      align-self: flex-end;
      padding: 0.45rem 1.2rem;
      background: var(--ink);
      color: #fff;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-radius: 2px;
      transition: background 0.15s, transform 0.1s;
    }
    #send-btn:hover { background: #333; }
    #send-btn:active { transform: scale(0.97); }
    #send-btn:disabled { opacity: 0.35; cursor: default; transform: none; }

    /* ── ITINERARY PANE ─────────────────────────────────── */
    #itinerary-pane {
      flex: 1;
      overflow-y: auto;
      background: var(--cream);
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    /* empty state */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 1rem;
      padding: 2rem;
      text-align: center;
      pointer-events: none;
    }
    .empty-compass {
      font-size: 2.5rem;
      opacity: 0.18;
    }
    .empty-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--ink);
      opacity: 0.25;
    }
    .empty-sub {
      font-size: 0.78rem;
      color: var(--mist);
      opacity: 0.7;
      max-width: 240px;
      line-height: 1.6;
    }

    /* itinerary content */
    #itinerary-content {
      display: none;
      padding: 2rem 2.5rem 3rem;
      max-width: 820px;
    }
    #itinerary-content.visible { display: block; }

    .itin-header {
      margin-bottom: 2rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .itin-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      font-weight: 600;
      line-height: 1.2;
      color: var(--ink);
      margin-bottom: 0.5rem;
    }
    .itin-meta {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
    }
    .itin-meta-chip {
      font-size: 0.72rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--gold);
      border: 1px solid var(--gold-lt);
      padding: 0.2rem 0.6rem;
      border-radius: 2px;
      background: rgba(184,146,74,0.06);
    }

    /* day cards */
    .days-grid {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .day-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      overflow: hidden;
      animation: fadeUp 0.35s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .day-card-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.85rem 1.25rem;
      background: var(--ink);
      color: #fff;
      cursor: pointer;
      user-select: none;
    }
    .day-number {
      font-size: 0.65rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      opacity: 0.55;
      flex-shrink: 0;
    }
    .day-name {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-style: italic;
      flex: 1;
    }
    .day-cost {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--gold-lt);
      flex-shrink: 0;
    }
    .day-chevron {
      font-size: 0.7rem;
      opacity: 0.45;
      flex-shrink: 0;
      transition: transform 0.2s;
    }
    .day-card.collapsed .day-chevron { transform: rotate(-90deg); }

    .day-body {
      padding: 0.5rem 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .day-card.collapsed .day-body { max-height: 0; padding: 0; }

    .slot {
      display: flex;
      align-items: flex-start;
      gap: 0.9rem;
      padding: 0.65rem 1.25rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }
    .slot:last-child { border-bottom: none; }
    .slot:hover { background: var(--paper); }

    .slot-icon {
      font-size: 1rem;
      flex-shrink: 0;
      width: 22px;
      text-align: center;
      margin-top: 1px;
    }
    .slot-body { flex: 1; min-width: 0; }
    .slot-period {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 500;
      margin-bottom: 0.15rem;
    }
    .slot-period.morning  { color: var(--gold); }
    .slot-period.afternoon { color: var(--rust); }
    .slot-period.evening  { color: var(--sage); }
    .slot-period.lodging  { color: var(--mist); }
    .slot-period.dining   { color: var(--sage); }

    .slot-name {
      font-size: 0.88rem;
      font-weight: 500;
      line-height: 1.35;
      color: var(--ink);
    }
    .slot-detail {
      font-size: 0.75rem;
      color: var(--mist);
      margin-top: 0.15rem;
      line-height: 1.4;
    }
    .slot-note {
      display: inline-block;
      margin-top: 0.25rem;
      font-size: 0.68rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--rust);
      background: rgba(196,92,58,0.08);
      padding: 0.1rem 0.4rem;
      border-radius: 2px;
    }
    .slot-cost {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--ink);
      flex-shrink: 0;
      padding-top: 1px;
    }

    /* total bar */
    .itin-total {
      margin-top: 1.5rem;
      padding: 1rem 1.5rem;
      background: var(--ink);
      color: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 3px;
    }
    .total-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.55;
    }
    .total-amount {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
    }

    /* disruption banner */
    #disruption-banner {
      display: none;
      margin-top: 1.25rem;
      padding: 0.9rem 1.25rem;
      background: rgba(196,92,58,0.08);
      border: 1px solid rgba(196,92,58,0.25);
      border-radius: 3px;
      font-size: 0.8rem;
      color: var(--rust);
      line-height: 1.5;
    }
    #disruption-banner.visible { display: block; }
    .disruption-label {
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      margin-bottom: 0.3rem;
    }

    /* raw fallback */
    .raw-response {
      white-space: pre-wrap;
      font-size: 0.83rem;
      line-height: 1.7;
      color: var(--ink);
      padding: 1.5rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 3px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-word">Itinerary AI</span>
    <span class="logo-tag">Travel Optimizer</span>
  </div>
  <span class="header-hint">For travel advisors &amp; independent explorers</span>
</header>

<div id="main">

  <!-- ── CHAT ── -->
  <div id="chat-pane">
    <div id="messages"></div>
    <div id="input-area">
      <textarea id="user-input" rows="3"
        placeholder="Describe a trip — or report a disruption&#10;e.g. &quot;5-day Rome, couple, $200/day, ancient history&quot;"></textarea>
      <button id="send-btn">Plan trip →</button>
    </div>
  </div>

  <!-- ── ITINERARY ── -->
  <div id="itinerary-pane">
    <div id="empty-state">
      <div class="empty-compass">✦</div>
      <div class="empty-title">Your itinerary<br>will appear here</div>
      <div class="empty-sub">Describe your trip in the chat to generate a day-by-day plan</div>
    </div>
    <div id="itinerary-content"></div>
  </div>

</div>

<script>
// ─── State ────────────────────────────────────────────────
let sessionId = null;

// ─── DOM refs ─────────────────────────────────────────────
const msgs       = document.getElementById('messages');
const input      = document.getElementById('user-input');
const btn        = document.getElementById('send-btn');
const emptyState = document.getElementById('empty-state');
const itinPane   = document.getElementById('itinerary-content');

// ─── Chat helpers ─────────────────────────────────────────
function addMsg(role, html, loading = false) {
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role}${loading ? ' loading' : ''}`;
  const label = role === 'user' ? 'You' : 'Advisor AI';
  wrap.innerHTML = `
    <div class="msg-label">${label}</div>
    <div class="bubble">${html}</div>`;
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  return wrap;
}

function mdToHtml(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── Itinerary parser ─────────────────────────────────────
//
// Parses the solver's markdown text format into structured day objects.
// Expected format (from solver prompt):
//   **N-Day City Itinerary**
//   Budget: $X/day | Group: Y
//   **Day N — Theme**
//   - 🏨 ...  - 🌅 Morning: ...  - 🌇 Afternoon: ...  - 🍽️ Lunch: ...
//   - 💰 Day total: ~$X/person
//   **Total estimated cost: $X ...**

const PERIOD_ICONS = {
  '🏨': { period: 'lodging',   label: 'Lodging'    },
  '🌅': { period: 'morning',   label: 'Morning'    },
  '🌇': { period: 'afternoon', label: 'Afternoon'  },
  '🌆': { period: 'evening',   label: 'Evening'    },
  '🍽': { period: 'dining',    label: 'Dining'     },
  '🍽️': { period: 'dining',    label: 'Dining'     },
  '💰': { period: 'cost',      label: 'Daily Cost' },
};

const SLOT_ICONS = {
  lodging:   '🏨',
  morning:   '🌅',
  afternoon: '🌇',
  evening:   '🌆',
  dining:    '🍽️',
  cost:      '💰',
};

function parseItinerary(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const result = { title: '', meta: [], days: [], total: '', raw: text };

  let currentDay = null;

  for (const line of lines) {
    // Title line: **5-Day Rome Itinerary**
    if (!result.title && /^\*\*.+itinerary.*/i.test(line)) {
      result.title = line.replace(/\*\*/g, '').replace(/^#+\s*/, '');
      continue;
    }

    // Meta line: Budget: $200/day | Group: Couple
    if (/^budget:/i.test(line) || /^\*?budget:/i.test(line)) {
      const clean = line.replace(/\*\*/g, '');
      result.meta = clean.split('|').map(s => s.trim()).filter(Boolean);
      continue;
    }

    // Total line
    if (/total estimated cost/i.test(line)) {
      result.total = line.replace(/\*\*/g, '').replace(/^-\s*/, '');
      continue;
    }

    // Day header: **Day 1 — Vatican**  or  **Day 1 - Vatican**
    const dayMatch = line.match(/^\*?\*?Day\s+(\d+)\s*[—–-]+\s*(.+?)\*?\*?$/i);
    if (dayMatch) {
      currentDay = { number: parseInt(dayMatch[1]), name: dayMatch[2].replace(/\*\*/g,'').trim(), slots: [], cost: '' };
      result.days.push(currentDay);
      continue;
    }

    // Slot line starting with - emoji or bullet
    if (currentDay && /^[-•]\s/.test(line)) {
      const content = line.replace(/^[-•]\s+/, '');

      // cost line
      if (/💰/.test(content) || /day total/i.test(content)) {
        currentDay.cost = content.replace(/💰\s*/, '').replace(/\*\*/g,'').trim();
        continue;
      }

      // detect icon and period
      let period = 'morning';
      let icon = '📍';
      for (const [emoji, meta] of Object.entries(PERIOD_ICONS)) {
        if (content.startsWith(emoji)) {
          period = meta.period;
          icon = emoji;
          break;
        }
      }

      // strip leading emoji + period label (e.g. "Morning: ")
      let body = content.replace(/^[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}️\s]+/u, '').trim();
      body = body.replace(/^(morning|afternoon|evening|lunch|dinner|breakfast|lodging):\s*/i, '').trim();

      // extract note (text after " — " or parenthesized)
      let note = '';
      const noteMatch = body.match(/—\s*(.+)$/);
      if (noteMatch) {
        note = noteMatch[1].trim();
        body = body.slice(0, noteMatch.index).trim();
      }

      // extract cost from parens (~$X or $X/person)
      let cost = '';
      const costMatch = body.match(/\(~?\$[\d,]+[^)]*\)/);
      if (costMatch) {
        cost = costMatch[0].replace(/[()]/g,'').trim();
        body = body.replace(costMatch[0], '').trim();
      } else {
        // cost at end without parens: "...  ~$20/person"
        const endCost = body.match(/~?\$[\d,]+[^\s,]*/);
        if (endCost) {
          cost = endCost[0];
          body = body.replace(endCost[0], '').replace(/,\s*$/, '').trim();
        }
      }

      if (body) {
        currentDay.slots.push({ period, icon: SLOT_ICONS[period] || '📍', name: body, note, cost });
      }
    }
  }

  return result;
}

// ─── Render itinerary ─────────────────────────────────────
function renderItinerary(text) {
  const data = parseItinerary(text);

  // hide empty state
  emptyState.style.display = 'none';
  itinPane.classList.add('visible');

  // if parsing produced no days, fall back to raw
  if (data.days.length === 0) {
    itinPane.innerHTML = `<div class="raw-response">${mdToHtml(escHtml(text))}</div>`;
    return;
  }

  const metaChips = data.meta
    .map(m => `<span class="itin-meta-chip">${escHtml(m)}</span>`)
    .join('');

  const dayCards = data.days.map((day, i) => {
    const slots = day.slots.map(slot => {
      const noteHtml = slot.note
        ? `<span class="slot-note">⚠ ${escHtml(slot.note)}</span>` : '';
      return `
        <div class="slot">
          <div class="slot-icon">${slot.icon}</div>
          <div class="slot-body">
            <div class="slot-period ${slot.period}">${slot.period}</div>
            <div class="slot-name">${escHtml(slot.name)}</div>
            ${slot.note ? `<div class="slot-detail">${noteHtml}</div>` : ''}
          </div>
          ${slot.cost ? `<div class="slot-cost">${escHtml(slot.cost)}</div>` : ''}
        </div>`;
    }).join('');

    const costBadge = day.cost
      ? `<span class="day-cost">${escHtml(day.cost)}</span>` : '';

    return `
      <div class="day-card" style="animation-delay:${i * 0.06}s">
        <div class="day-card-header" onclick="toggleDay(this)">
          <span class="day-number">Day ${day.number}</span>
          <span class="day-name">${escHtml(day.name)}</span>
          ${costBadge}
          <span class="day-chevron">▼</span>
        </div>
        <div class="day-body">${slots}</div>
      </div>`;
  }).join('');

  const totalHtml = data.total ? `
    <div class="itin-total">
      <span class="total-label">Total estimated cost</span>
      <span class="total-amount">${escHtml(data.total.replace(/total estimated cost:?\s*/i,''))}</span>
    </div>` : '';

  itinPane.innerHTML = `
    <div class="itin-header">
      <div class="itin-title">${escHtml(data.title || 'Your Itinerary')}</div>
      <div class="itin-meta">${metaChips}</div>
    </div>
    <div class="days-grid">${dayCards}</div>
    ${totalHtml}
    <div id="disruption-banner"></div>`;
}

function toggleDay(header) {
  header.closest('.day-card').classList.toggle('collapsed');
}

// ─── Detect & render disruption delta ────────────────────
function renderDisruption(text) {
  const banner = document.getElementById('disruption-banner');
  if (!banner) return;
  // show disruption as a banner above the itinerary
  banner.innerHTML = `<div class="disruption-label">⚡ Re-plan applied</div>${mdToHtml(escHtml(text))}`;
  banner.classList.add('visible');
  banner.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function isDisruptionResponse(text) {
  return /re.plan|disruption|replaced|removed slot|affected day/i.test(text);
}

// ─── Send ─────────────────────────────────────────────────
async function send() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  btn.disabled = true;

  addMsg('user', escHtml(text));
  const loadingWrap = addMsg('assistant', '<div class="typing"><span></span><span></span><span></span></div>', true);

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, session_id: sessionId }),
    });

    const raw = await res.text();

    if (!res.ok) {
      let detail = raw;
      try { detail = JSON.parse(raw).detail ?? raw; } catch(_) {}
      loadingWrap.querySelector('.bubble').innerHTML =
        `<span style="color:var(--rust)">Error ${res.status}</span><br><small>${escHtml(detail.slice(0,200))}</small>`;
      loadingWrap.classList.remove('loading');
      btn.disabled = false;
      return;
    }

    const data = JSON.parse(raw);
    sessionId = data.session_id;
    const response = data.response;

    // update chat bubble with plain summary (first 3 lines or short response)
    const summary = extractChatSummary(response);
    loadingWrap.querySelector('.bubble').innerHTML = mdToHtml(escHtml(summary));
    loadingWrap.classList.remove('loading');

    // render itinerary or disruption in right pane
    if (isDisruptionResponse(response)) {
      renderDisruption(response);
    } else if (/day \d/i.test(response) && /morning|afternoon|evening|itinerary/i.test(response)) {
      renderItinerary(response);
    }

  } catch(e) {
    loadingWrap.querySelector('.bubble').textContent = e.message;
    loadingWrap.classList.remove('loading');
  }

  btn.disabled = false;
  input.focus();
}

// extract a short chat summary (first paragraph or ~3 lines)
function extractChatSummary(text) {
  const lines = text.split('\n').filter(l => l.trim());
  // find non-slot lines (no leading emoji or dash-slot pattern)
  const summary = lines
    .filter(l => !/^[-•]\s*[🏨🌅🌇🌆🍽💰]/.test(l) && !/^\*\*Day \d/.test(l))
    .slice(0, 3)
    .join('\n');
  return summary || lines[0] || text;
}

// ─── Event listeners ──────────────────────────────────────
btn.addEventListener('click', send);
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
input.focus();
</script>
