<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Travel Optimizer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        header { padding: 1rem 2rem; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; gap: 1rem; }
        header h1 { font-size: 1.1rem; font-weight: 600; }
        header span { font-size: 0.8rem; color: #999; }
        #main { display: flex; flex: 1; overflow: hidden; }
        /* Chat pane */
        #chat-pane { width: 420px; min-width: 320px; display: flex; flex-direction: column; border-right: 1px solid #e0e0e0; }
        #messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
        .msg { line-height: 1.6; max-width: 90%; }
        .msg.user { align-self: flex-end; background: #000; color: #fff; padding: 0.6rem 1rem; border-radius: 12px 12px 2px 12px; }
        .msg.assistant { align-self: flex-start; }
        .msg .role { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: #999; margin-bottom: 0.2rem; }
        .msg.loading .content { color: #999; }
        #input-area { display: flex; gap: 0.75rem; padding: 1rem 1.5rem; border-top: 1px solid #e0e0e0; }
        #user-input { flex: 1; padding: 0.6rem 0; border: none; border-bottom: 1px solid #e0e0e0; font-size: 0.95rem; outline: none; resize: none; font-family: inherit; }
        #user-input:focus { border-bottom-color: #000; }
        button { padding: 0.6rem 1.2rem; background: #000; color: #fff; border: none; font-size: 0.75rem; text-transform: uppercase; cursor: pointer; letter-spacing: 0.05em; }
        button:disabled { opacity: 0.3; cursor: default; }
        /* Itinerary pane */
        #itinerary-pane { flex: 1; overflow-y: auto; padding: 2rem; background: #fafafa; }
        #itinerary-pane h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1.5rem; color: #333; }
        .placeholder { color: #bbb; font-size: 0.9rem; margin-top: 4rem; text-align: center; }
    </style>
</head>
<body>
    <header>
        <h1>AI Travel Optimizer</h1>
        <span>Describe your trip to get started. Try: "5-day Rome trip, couple, $200/day, ancient history"</span>
    </header>
    <div id="main">
        <div id="chat-pane">
            <div id="messages"></div>
            <div id="input-area">
                <textarea id="user-input" rows="2" placeholder="Describe your trip or report a disruption..."></textarea>
                <button id="send-btn">Send</button>
            </div>
        </div>
        <div id="itinerary-pane">
            <h2>Itinerary</h2>
            <p class="placeholder">Your itinerary will appear here after the agent builds it.</p>
        </div>
    </div>

    <script>
        const msgs = document.getElementById("messages");
        const input = document.getElementById("user-input");
        const btn = document.getElementById("send-btn");
        let sessionId = null;

        function addMsg(role, text, isLoading = false) {
            const div = document.createElement("div");
            div.className = `msg ${role === "you" ? "user" : "assistant"} ${isLoading ? "loading" : ""}`;
            if (role === "you") {
                div.innerHTML = `<div class="content">${escHtml(text)}</div>`;
            } else {
                div.innerHTML = `<div class="role">Advisor AI</div><div class="content">${escHtml(text)}</div>`;
            }
            msgs.appendChild(div);
            msgs.scrollTop = msgs.scrollHeight;
            return div;
        }

        function escHtml(str) {
            return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
        }

        async function send() {
            const text = input.value.trim();
            if (!text) return;
            input.value = "";
            btn.disabled = true;
            addMsg("you", text);
            const loading = addMsg("assistant", "Planning...", true);

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text, session_id: sessionId }),
                });
                const body = await res.text();
                if (!res.ok) {
                    let detail = body;
                    try { detail = JSON.parse(body).detail ?? body; } catch (_) {}
                    loading.querySelector(".content").textContent = `Error ${res.status}: ${detail}`;
                    loading.querySelector(".content").style.whiteSpace = "pre-wrap";
                    loading.classList.remove("loading");
                    btn.disabled = false;
                    return;
                }
                const data = JSON.parse(body);
                sessionId = data.session_id;
                loading.querySelector(".content").innerHTML = escHtml(data.response);
                loading.classList.remove("loading");
            } catch (e) {
                loading.querySelector(".content").textContent = e.message;
                loading.classList.remove("loading");
            }

            btn.disabled = false;
            input.focus();
        }

        btn.addEventListener("click", send);
        input.addEventListener("keydown", e => {
            if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
        });
        input.focus();
    </script>
</body>
</html>
